# Catppuccin 'lavender'
style = "bold lavender"
read_only = " ´á¢"


[aws]
format ='on [$symbol$profile]($style)9 '
style = 'bold blue'
[aws.profile_aliases]
Enterprise_Naming_Scheme-voidstars = 'void**'
symbol = "¯î¢  "

[battery]
